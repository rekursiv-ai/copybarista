name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Check release tree policy
        run: python scripts/check_release_tree.py . --allow-root-git

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run --all-groups ruff check .

      - name: Format check
        run: uv run --all-groups ruff format --check .

      - name: Type check
        run: uv run --all-groups basedpyright copybarista scripts tests

      - name: Test
        run: uv run --all-groups pytest

      - name: Build package
        run: uv build --out-dir dist

      - name: Smoke test built wheel
        run: |
          wheel="$(ls dist/copybarista-*.whl | head -n 1)"
          uv run --isolated --with "$wheel" python -c \
            "import copybarista; from copybarista.cli import main; print('ok')"
